name: Release

# PyPI publishing via OIDC Trusted Publishing — GitHub proves this workflow's
# identity to PyPI with a short-lived token, so there is NO long-lived API
# token to steal (DESIGN §9 supply-chain posture). Two triggers:
#   - workflow_dispatch          -> TestPyPI (the dry run; always run this first)
#   - a published GitHub Release -> real PyPI (tag must be vX.Y.Z)
# Before the FIRST publish the owner registers this repo as a Trusted Publisher
# on test.pypi.org and pypi.org: owner `rekreatedigital`, repo `rekoll`,
# workflow `release.yml`, environment `testpypi` / `pypi` respectively.
# Publishing is deliberately split: the build job runs arbitrary build-backend
# code but holds no publish credential; the publish jobs hold the OIDC grant
# but run only the pinned publish action on the already-built artifacts.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match ci.yml's supply-chain posture.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Check metadata
        run: twine check --strict dist/*
      - name: Release tag must match the package version
        # Refuse to publish a vX.Y.Z tag while src/rekoll/_version.py (the
        # single version source) still says something else — e.g. 0.1.0.dev0.
        # The tag and the version bump land in the same release commit.
        if: github.event_name == 'release'
        env:
          # Event-controlled strings never interpolate into the script body —
          # env indirection keeps a hostile tag name data, not code.
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          pkg="$(python -c 'import sys; sys.path.insert(0, "src"); from rekoll._version import __version__; print(__version__)')"
          if [ "v${pkg}" != "${RELEASE_TAG}" ]; then
            echo "::error::release tag ${RELEASE_TAG} does not match package version ${pkg}"
            exit 1
          fi
      - name: Smoke-test the wheel (console script included)
        run: |
          pip install dist/*.whl
          rekoll --version
          rekoll doctor
          python -m rekoll --help
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    # The dry run: manual dispatch only. Afterwards verify the page renders at
    # test.pypi.org/p/rekoll and that a scratch venv can
    # `pip install -i https://test.pypi.org/simple/ rekoll`.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/rekoll
    permissions:
      id-token: write # OIDC: only this job — never the build job
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rekoll
    permissions:
      id-token: write # OIDC: only this job — never the build job
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
