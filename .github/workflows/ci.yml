name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # Third-party actions are pinned to full commit SHAs (not tags) so a
      # re-pointed or compromised tag cannot silently change what runs in CI
      # (DESIGN §9 supply-chain posture). Dependabot proposes SHA bumps weekly.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  package:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs (P1-4).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Check metadata
        run: twine check --strict dist/*
      - name: Smoke-test the wheel (console script included)
        run: |
          pip install dist/*.whl
          rekoll --version
          rekoll doctor
          python -m rekoll --help

  audit:
    # Supply-chain vulnerability gate over the project's declared dependencies
    # (DESIGN §9). Scoped to the project (inputs: .) so unrelated advisories in
    # the ambient CI toolchain don't red the build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: pip-audit (project dependencies)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: .
