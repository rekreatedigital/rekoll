name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # Third-party actions are pinned to full commit SHAs (not tags) so a
      # re-pointed or compromised tag cannot silently change what runs in CI
      # (DESIGN §9 supply-chain posture). Dependabot proposes SHA bumps weekly.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  package:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs (P1-4).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Check metadata
        run: twine check --strict dist/*
      - name: Smoke-test the wheel (console script included)
        run: |
          pip install dist/*.whl
          rekoll --version
          rekoll doctor
          python -m rekoll --help

  audit:
    # Supply-chain vulnerability gate over the project's declared dependencies
    # (DESIGN §9). Scoped to the project (inputs: .) so unrelated advisories in
    # the ambient CI toolchain don't red the build.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: pip-audit (project dependencies)
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: .

  # Same suite with the optional MCP extra installed: runs the end-to-end
  # stdio server tests (skipped above) AND re-proves the zero-dep invariants
  # hold when mcp is present but unused.
  test-mcp:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
        include:
          # This cell pins the mcp version floor declared in pyproject so the
          # `mcp>=1.2` claim stays tested, on the OS where stdio encoding is
          # hostile (Windows pipes default to the ANSI codepage).
          - os: windows-latest
            python-version: "3.10"
            mcp-version: "==1.2.0"
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with the mcp extra)
        # The [mcp] extra already carries the `mcp>=1.2` floor. Only the pinned
        # matrix cell appends an explicit `mcp<constraint>`; other cells must NOT
        # render a bare, unconstrained `mcp` requirement (which would silently
        # override the declared floor). bash on all runners keeps this one line.
        shell: bash
        run: |
          if [ -n "${{ matrix.mcp-version }}" ]; then
            pip install -e ".[dev,mcp]" "mcp${{ matrix.mcp-version }}"
          else
            pip install -e ".[dev,mcp]"
          fi
      - name: Test
        run: pytest
