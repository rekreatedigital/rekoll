name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS is covered here on the core (zero-extra) suite. The optional
        # [mcp] and [embeddings] cells stay Linux/Windows-only below — the
        # platform-specific risks they cover (Windows pipe encoding, the ONNX
        # quality gate) aren't macOS-specific, so those extras aren't required
        # on this lane.
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      # Third-party actions are pinned to full commit SHAs (not tags) so a
      # re-pointed or compromised tag cannot silently change what runs in CI
      # (DESIGN §9 supply-chain posture). Dependabot proposes SHA bumps weekly.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  package:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs (P1-4).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build twine
          python -m build
      - name: Check metadata
        run: twine check --strict dist/*
      - name: Smoke-test the wheel (console script included)
        run: |
          pip install dist/*.whl
          rekoll --version
          rekoll doctor
          python -m rekoll --help

  audit:
    # Supply-chain vulnerability gate (DESIGN §9). The project declares ZERO
    # runtime dependencies, so the old `inputs: .` (a project audit of
    # pyproject) scanned an essentially empty closure and could never fire. The
    # advisories that actually matter live in the OPTIONAL extras people install
    # — [mcp] and the local embedding path [embeddings]/[bench] (fastembed +
    # onnxruntime + their transitive deps). So we build a venv with every
    # installable extra and audit THAT environment's full closure instead.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Build a venv with every installable extra
        run: |
          python -m venv .audit-venv
          # The venv's own pip is part of the audited closure; the runner's
          # bundled pip lags upstream and trips pip-audit on its own advisories
          # (PYSEC-2026-196 et al.) — upgrade it before anything is installed.
          .audit-venv/bin/python -m pip install --upgrade pip
          .audit-venv/bin/python -m pip install -e ".[dev,mcp,embeddings,bench]"
      - name: pip-audit (the extras' full transitive closure)
        # Environment audit of the venv above (note the absence of `inputs:`),
        # so the scan covers mcp + fastembed + onnxruntime and everything they
        # pull in — not the empty runtime-dep set. The action stays SHA-pinned
        # to match the supply-chain posture of the other jobs.
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          virtual-environment: .audit-venv/

  # Same suite with the optional MCP extra installed: runs the end-to-end
  # stdio server tests (skipped above) AND re-proves the zero-dep invariants
  # hold when mcp is present but unused.
  test-mcp:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
        include:
          # This cell pins the mcp version floor declared in pyproject so the
          # `mcp>=1.3` claim stays tested, on the OS where stdio encoding is
          # hostile (Windows pipes default to the ANSI codepage). 1.3.0 is the
          # first release with server `instructions` (the board guidance the
          # e2e initialize test asserts); 1.2.x silently dropped it.
          - os: windows-latest
            python-version: "3.10"
            mcp-version: "==1.3.0"
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with the mcp extra)
        # The [mcp] extra already carries the `mcp>=1.3` floor. Only the pinned
        # matrix cell appends an explicit `mcp<constraint>`; other cells must NOT
        # render a bare, unconstrained `mcp` requirement (which would silently
        # override the declared floor). bash on all runners keeps this one line.
        shell: bash
        run: |
          if [ -n "${{ matrix.mcp-version }}" ]; then
            pip install -e ".[dev,mcp]" "mcp${{ matrix.mcp-version }}"
          else
            pip install -e ".[dev,mcp]"
          fi
      - name: Test
        run: pytest

  # The real-embedder quality path (efficacy program, ADR-0011): the same
  # suite with the optional [embeddings] extra installed, via the [bench]
  # aggregation extra so the extra itself stays resolution-tested. This job is
  # what runs the RATCHETED semantic quality gate
  # (tests/test_benchmark_semantic.py — raise-only floors on the real model
  # over the frozen semantic_v1 fixture); the default `test` job stays offline
  # and skips that gate cleanly. Single fixed runner OS on purpose: floors are
  # calibrated with a tolerance band (baseline minus one bootstrap half-width),
  # not bit-exactness. The ONNX models are cached between runs; the cache key
  # tracks the fastembed floor declared in pyproject so a model-family bump
  # refreshes the cache.
  test-embeddings:
    runs-on: ubuntu-latest
    env:
      FASTEMBED_CACHE_PATH: ${{ github.workspace }}/.fastembed-cache
    steps:
      # SHA-pinned to match the supply-chain posture of the other jobs.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Cache fastembed ONNX models
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ github.workspace }}/.fastembed-cache
          key: fastembed-models-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install (with the embeddings extra, via [bench])
        run: pip install -e ".[dev,bench]"
      - name: Test
        run: pytest
