# Dependabot keeps the supply chain current (DESIGN §9): weekly PRs that bump
# GitHub Actions (by SHA — the pins in .github/workflows/) and Python tooling.
# Grouped so one PR carries a coherent bump set instead of a swarm.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"
