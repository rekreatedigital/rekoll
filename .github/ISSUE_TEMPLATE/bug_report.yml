name: Bug report
description: Something isn't working as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill everything in — issues missing the
        version / OS / reproduction are slow to act on. **Do not report security
        issues here** — see SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Rekoll version
      placeholder: "output of `rekoll --version` (or a git commit)"
    validations: { required: true }
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: ["Windows", "macOS", "Linux"]
    validations: { required: true }
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.x"
    validations: { required: true }
  - type: input
    id: backend
    attributes:
      label: Storage backend
      placeholder: "sqlite (default), postgres, ..."
    validations: { required: true }
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal snippet or command sequence.
    validations: { required: true }
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations: { required: true }
